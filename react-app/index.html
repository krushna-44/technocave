<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Plan your Maharashtra trip easily. Explore cities, tourist places, and create travel itineraries." />
  <title>RoamGenie Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
  /* Warm neutral background + deep ocean accent + gold detail */
  --primary: #0f1e32;          /* deep navy for headings, strong text */
  --primary-blue: #01696f;     /* ocean teal used for highlights and CTAs */
  --accent: #f9b233;           /* gold */
  --accent-hover: #e09e1b;     /* darker gold on hover */

  --bg: #f7f6f2;               /* warm off‑white background */
  --card-bg: #ffffff;          /* cards stay pure white */
  --text: #1e293b;             /* dark slate text */
  --muted: #64748b;            /* muted text */
  --border: #e2e8f0;           /* soft border */

  --radius: 12px;
  --radius-lg: 20px;
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.06),
            0 8px 30px rgba(15, 23, 42, 0.08);
  --shadow-hover: 0 16px 40px rgba(15, 23, 42, 0.16);

  --font: 'Montserrat', Arial, sans-serif;
}

    [data-theme="dark"] {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --primary: #4d9de0;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    [data-theme="dark"] nav {
      background: rgba(5, 10, 20, 0.95);
      border-bottom: 1px solid rgba(77,157,224,0.2);
    }
    [data-theme="dark"] .dropdown {
      background: #161b22;
      border: 1px solid #30363d;
    }
    [data-theme="dark"] .dropdown a {
      color: #e6edf3;
    }
    [data-theme="dark"] .dropdown a:hover {
      background: #21262d;
      color: #f9b233;
    }
    [data-theme="dark"] .trip-planner {
      background: #161b22;
      border: 1px solid #30363d;
    }
    [data-theme="dark"] select,
    [data-theme="dark"] input[type="number"] {
      background: #21262d;
      color: #e6edf3;
      border-color: #30363d;
    }
    [data-theme="dark"] .card {
      background: #161b22;
      border: 1px solid #30363d;
    }
    [data-theme="dark"] .itinerary-section {
      background: #161b22;
      border: 1px solid #30363d;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 6vw;
  height: 70px;
  background: rgba(10, 20, 35, 0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 6px 30px rgba(15,23,42,0.6);
  border-bottom: 1px solid rgba(249,178,51,0.18);
}

    .logo {
  font-size: 1.4rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.25em;
  display: flex;
  align-items: center;
  gap: 10px;
  text-transform: uppercase;
}
.logo i { color: var(--accent); font-size: 1.3rem; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .nav-search {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      gap: 8px;
      margin-right: 8px;
    }
    .nav-search input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      width: 180px;
    }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-search i { color: var(--muted); font-size: 0.9rem; }
    .nav-icon-btn {
  background: rgba(248, 250, 252, 0.08);
  border: 1px solid rgba(148, 163, 184, 0.6);
  color: #e2e8f0;
  border-radius: 999px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.2s;
}
.nav-icon-btn:hover {
  background: var(--accent);
  color: #0f172a;
  border-color: var(--accent);
}

.plan-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: #0f172a;
  border: none;
  border-radius: 999px;
  padding: 10px 28px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.12em;
  box-shadow: 0 8px 24px rgba(249,178,51,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
  font-family: var(--font);
}
.plan-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 32px rgba(249,178,51,0.65);
}
    .dots-wrap {
      position: relative;
    }
    .dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-hover);
      min-width: 150px;
      overflow: hidden;
      z-index: 200;
      animation: fadeDown 0.15s ease;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dropdown a {
      display: block;
      padding: 11px 18px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .dropdown a:hover {
      background: #f1f5f9;
      color: var(--primary-blue);
    }

    .carousel-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      background: #0f172a;
    }
    .carousel-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.35) 40%,
        rgba(0,0,0,0.05) 100%
      );
      pointer-events: none;
      z-index: 1;
    }
    .carousel-caption {
      position: absolute;
      left: 8vw;
      bottom: 140px;
      z-index: 2; /* ensure above overlay */
    }
    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s cubic-bezier(.4,0,.2,1);
    }
    .carousel-slide.active { opacity: 1; z-index: 2; }
    .carousel-slide img {
      width: 100%;
      height: 100vh;
      min-height: 600px;
      object-fit: cover;
      filter: brightness(0.5) saturate(1.2);
      display: block;
    }
    .carousel-caption h1 {
  font-size: 3.5rem;
  font-weight: 900;
  font-family: 'Playfair Display', Georgia, serif;
  text-transform: uppercase;
  color: #ffffff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
  letter-spacing: 0.2em;
  margin-bottom: 12px;
  max-width: 620px;
}

    .carousel-caption p {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  margin: 0 0 28px;
  max-width: 480px;
}
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.1rem;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-btn:hover {
      background: var(--primary-blue);
      border-color: var(--primary-blue);
    }
    .carousel-btn.prev { left: 24px; }
    .carousel-btn.next { right: 24px; }
    .carousel-dots {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .dot {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: all 0.25s;
    }
    .dot.active {
      background: var(--accent);
      width: 40px;
    }
    .explore-btn {
      position: static;
      transform: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 28px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      letter-spacing: 0.3px;
    }
    .explore-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .intro {
      text-align: center;
      padding: 80px 8vw 40px;
      background: #fff;
    }
    .intro h2 {
      font-size: 2.6rem;
      color: #1e3a5c;
      font-weight: 800;
      margin-bottom: 16px;
      position: relative;
      display: inline-block;
    }
    .intro p {
      color: #555;
      font-size: 1.1rem;
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.9;
    }
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
      padding: 0 8vw 0;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      text-align: center;
      padding: 24px 48px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary-blue);
    }
    .stat-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .trip-planner {
      background: #fff;
      margin: 48px auto;
      max-width: 820px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 40px 36px 32px;
    }
    .trip-planner h2 {
      text-align: center;
      margin-bottom: 32px;
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 800;
    }
    .planner-form { display: flex; flex-wrap: wrap; gap: 20px; }
    .form-group {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .form-group label {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    select, input[type="number"] {
      padding: 11px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: 0.95rem;
      font-family: var(--font);
      background: #f8fafc;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
      color: var(--text);
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
      background: #fff;
    }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #f8fafc;
      transition: all 0.15s;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .checkbox-group label:has(input:checked) {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }
    .checkbox-group input { display: none; }
    .submit-btn {
      width: 100%;
      margin-top: 8px;
      background: var(--primary-blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      font-family: var(--font);
    }
    .submit-btn:hover {
      background: #1447c0;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(26,86,219,0.3);
    }

    .recommendations {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4vw 80px;
    }
    .rec-header {
      text-align: center;
      margin-bottom: 40px;
      padding-top: 56px;
    }
    .rec-header h2 {
  font-size: 2.2rem;
  color: var(--primary);
  margin-bottom: 8px;
  font-weight: 800;
  position: relative;
}
    .rec-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 24px;
      margin-bottom: 36px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(30,58,92,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 16px 40px rgba(30,58,92,0.18);
    }
    .card-img-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1e3a5c15, #f9b23325);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #eee;
    }
    .card-content { padding: 18px; flex: 1; }
    .card-content h3 {
  margin: 0 0 8px;
  font-size: 1.1rem;
  color: var(--primary);
  font-weight: 700;
}
    .card-content p {
      color: var(--muted);
      font-size: 0.88rem;
      margin: 0 0 14px;
      line-height: 1.6;
    }
    .tag {
      display: inline-block;
      background: linear-gradient(135deg, #f9b233, #e09e1b);
      color: white;
      border-radius: 20px;
      font-size: 0.78rem;
      padding: 3px 12px;
      margin: 2px 3px 2px 0;
      font-weight: 600;
    }
    .cost-tag {
      background: #dcfce7;
      color: #15803d;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 3px 10px;
      font-weight: 700;
    }

    .itinerary-section {
      background: #fff;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 28px 28px 20px;
      margin-bottom: 24px;
    }
    .itinerary-section h3 {
      color: var(--text);
      margin-top: 0;
      font-size: 1.15rem;
      font-weight: 800;
    }
    .itinerary-day {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .itinerary-day:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .day-badge {
      background: var(--primary-blue);
      color: #fff;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.88rem;
      flex-shrink: 0;
    }
    .day-places {
      font-size: 0.93rem;
      color: var(--text);
      line-height: 1.6;
      padding-top: 6px;
    }

    .budget-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .budget-tips {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 22px 24px;
    }
    .budget-tips h4 {
      margin: 0 0 12px;
      color: #92400e;
      font-size: 0.95rem;
    }
    .budget-tips ul {
      margin: 0;
      padding-left: 18px;
      color: #78350f;
      font-size: 0.9rem;
      line-height: 1.9;
    }
    .cost-card {
      background: linear-gradient(135deg, var(--primary-blue), #3b82f6);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .cost-card .amount {
      font-size: 2.4rem;
      font-weight: 800;
      color: #fbbf24;
    }
    .cost-card .cost-label {
      font-size: 0.88rem;
      opacity: 0.85;
      margin-top: 6px;
    }

    .city-page {
      padding: 56px 8vw;
      text-align: center;
      background: var(--bg);
      min-height: 80vh;
    }
    .city-page h2 {
      font-size: 1.8rem;
      color: var(--text);
      margin-bottom: 40px;
      font-weight: 800;
    }
    .city-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .city-card {
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      background: var(--card-bg);
    }
    .city-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }
    .city-card:hover img {
      transform: scale(1.08);
    }
    .city-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .city-card-name {
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      border-top: 1px solid var(--border);
    }

    .back-btn {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      margin-bottom: 28px;
      transition: all 0.2s;
      font-family: var(--font);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    footer {
      background: linear-gradient(135deg, #0f1e32, #1e3a5c);
      color: #94a3b8;
      text-align: center;
      padding: 48px 8vw 24px;
    }
    footer .footer-links {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 20px;
    }
    footer .footer-links a {
      color: #f9b233;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    footer .footer-links a:hover { color: #fff; }
    footer p {
      margin: 4px 0;
      font-size: 0.88rem;
    }

    /* PAGE TRANSITION */
    .page {
      animation: pageIn 0.35s ease;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {

      .carousel-wrap,
      .carousel-slide img {
        height: 300px;
      }

      .carousel-caption h1 {
        font-size: 1.5rem;
      }

      .carousel-caption {
        padding: 16px 18px;
      }

      .budget-section {
        grid-template-columns: 1fr;
      }

      nav {
        padding: 12px 4vw;
      }

      .logo {
        font-size: 1.1rem;
      }

      .trip-planner {
        padding: 20px 12px;
      }

      .nav-search input {
        width: 90px;
      }
    }
  
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes revealLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes revealRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    .reveal-left { animation: revealLeft 0.7s ease both; }
    .reveal-right { animation: revealRight 0.7s ease both; }
    .scale-in { animation: scaleIn 0.6s ease both; }

    const getPlaceImage = (placeName) => {
      if (!placeName) return null;
      const name = placeName.trim();
      
      // 1. Direct exact match
      if (placeImages[name]) return placeImages[name];
      
      // 2. Case-insensitive exact match
      const lowerName = name.toLowerCase();
      const keys = Object.keys(placeImages);
      const exactCI = keys.find(k => k.toLowerCase() === lowerName);
      if (exactCI) return placeImages[exactCI];
      
      // 3. Normalize both: remove special chars, lowercase, trim spaces
      const normalize = str => str.toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      
      const normName = normalize(name);
      const normMatch = keys.find(k => normalize(k) === normName);
      if (normMatch) return placeImages[normMatch];
      
      // 4. Check if the key is fully contained in the name
      // (e.g. "Trimbakeshwar" matches "Trimbakeshwar Temple")
      // Only if key is at least 8 characters to avoid short false matches
      const containedKey = keys.find(k => {
        const normKey = normalize(k);
        return normKey.length >= 8 && normName.includes(normKey);
      });
      if (containedKey) return placeImages[containedKey];
      
      // 5. Check if name is fully contained in the key
      // Only if name is at least 8 characters
      const nameInKey = keys.find(k => {
        const normKey = normalize(k);
        return normName.length >= 8 && normKey.includes(normName);
      });
      if (nameInKey) return placeImages[nameInKey];
      
      return null;
    };

    function Carousel({ onExplore }) {
      const [idx, setIdx] = useState(0);
      const next = () => setIdx(i => (i + 1) % slides.length);
      const prev = () => setIdx(i => (i - 1 + slides.length) % slides.length);

      useEffect(() => {
        const t = setInterval(next, 4500);
        return () => clearInterval(t);
      }, []);

      return (
        <div className="carousel-wrap">
          {slides.map((s, i) => (
            <div key={i} className={`carousel-slide${i === idx ? " active" : ""}`}>
              <img src={s.img} alt={s.title} />
              <div className="carousel-caption">
                <div style={{ width: "60px", height: "4px", background: "#f9b233", borderRadius: "2px", margin: "0 0 16px" }} />
                <h1>{s.title}</h1>
                <p>{s.sub}</p>
              </div>
            </div>
          ))}
          <button className="carousel-btn prev" onClick={prev}><i className="fa fa-chevron-left" /></button>
          <button className="carousel-btn next" onClick={next}><i className="fa fa-chevron-right" /></button>
          <div className="carousel-dots">

    function HomeHighlights({ data, onPlaceClick }) {
      const popRef = useRef(null);
      const undRef = useRef(null);

      if (!data) return null;
      const popular = data.categories?.popular_places || [];
      const underrated = data.categories?.underrated_places || [];
      if (!popular.length && !underrated.length) return null;
      const toCard = p => ({
        name: p.name,
        description: p.short_description || "",
        short_description: p.short_description || "",
        long_description: p.long_description || "",
        famous_for: p.famous_for || [],
        category: p.tags || [],
        icon: p.icon || "📍",
        location: p.location || "Maharashtra",
        cost: 0,
        city: "Maharashtra"
      });

      const scroll = (ref, amount) => {
        if (ref.current) ref.current.scrollBy({ left: amount, behavior: "smooth" });
      };

      const renderSection = (title, places, scrollRef) => (
        <>
          <div className="rec-header" style={{ marginTop: "20px", paddingTop: "20px" }}>
            <h2>{title}</h2>
            <div style={{ width: "50px", height: "3px", background: "#f9b233", borderRadius: "2px", margin: "8px auto 16px" }} />

            <ArrowButton direction="left" onClick={() => scroll(scrollRef, -300)} />

              {places.map((p, i) => (

                  <PlaceCard place={toCard(p)} onPlaceClick={onPlaceClick} />

            <ArrowButton direction="right" onClick={() => scroll(scrollRef, 300)} />
          </div>
        </>
      );

      return (
        <section className="recommendations">
          {popular.length > 0 && renderSection("🔥 Popular Places in Maharashtra", popular, popRef)}

    // ── Planner Form ──────────────────────────────────────────────────────────
    function TripPlanner({ plannerRef, onResults, placesData }) {
      const [city, setCity] = useState("");
      const [days, setDays] = useState(3);
      const [budget, setBudget] = useState("");
      const [selected, setSelected] = useState([]);

      if (!placesData.length) return <p style={{ textAlign: "center", padding: "40px", color: "var(--muted)" }}>Loading data...</p>;

      const toggleCat = cat => setSelected(s => s.includes(cat) ? s.filter(c => c !== cat) : [...s, cat]);

      const handleSubmit = e => {
        e.preventDefault();
        let filtered = placesData.filter(p => p.city === city);
        if (selected.length > 0) {
          filtered = filtered.filter(p =>
            p.category.some(c => selected.map(s => s.toLowerCase()).includes(c.toLowerCase()))
          );
        }
        if (!filtered.length) filtered = placesData.filter(p => p.city === city);
        onResults({ city, days, budget, selected, filtered });
      };

      return (
        <section className="trip-planner" ref={plannerRef} id="trip-planner">
          <h2><i className="fa fa-compass" style={{ color: "var(--accent)", marginRight: 10 }} />Plan Your Trip</h2>
          <form className="planner-form" onSubmit={handleSubmit}>
            <div className="form-group">
              <label>Select City</label>
              <select value={city} onChange={e => setCity(e.target.value)} required>
                <option value="">-- Choose City --</option>
                {[...new Set(placesData.map(p => p.city))].map(c => (
                  <option key={c} value={c}>{c}</option>
                ))}
              </select>
            </div>
            <div className="form-group" style={{ flexBasis: "100%" }}>
              <label>Tourism Categories</label>
              <div className="checkbox-group">
                {categories.map(cat => (
                  <label key={cat}>
                    <input type="checkbox" checked={selected.includes(cat)} onChange={() => toggleCat(cat)} />
                    {cat}
                  </label>
                ))}
              </div>
            </div>
            <div className="form-group">
              <label>Number of Days</label>
              <input type="number" min="1" max="14" value={days} onChange={e => setDays(+e.target.value)} required />
            </div>
            <div className="form-group">
              <label>Budget</label>
              <select value={budget} onChange={e => setBudget(e.target.value)} required>
                <option value="">-- Select Budget --</option>
                {["Low", "Medium", "High"].map(b => <option key={b}>{b}</option>)}
              </select>
            </div>
            <div className="form-group" style={{ flexBasis: "100%" }}>
              <button type="submit" className="submit-btn"><i className="fa fa-wand-magic-sparkles" /> Get Recommendations</button>
            </div>
          </form>
        </section>
      );
    }

    function CityDetailsPage({ city, onBack, placesData, onPlaceClick, onAddToTrolley, trolleyItems }) {
      const [activeTab, setActiveTab] = useState("All");
      if (!placesData || placesData.length === 0) return <p style={{ textAlign: "center", padding: "40px", color: "var(--muted)" }}>No places found</p>;
      const places = placesData.filter(p => p.city === city);
      const tabs = ["All", ...categories.filter(cat =>
        places.some(p => p.category.some(c => c.toLowerCase() === cat.toLowerCase()))
      )];
      const visible = activeTab === "All" ? places : places.filter(p =>
        p.category.some(c => c.toLowerCase() === activeTab.toLowerCase())
      );
      return (
        <div className="city-page page">
          <button className="back-btn" onClick={onBack}><i className="fa fa-arrow-left" style={{ marginRight: 6 }} />Back</button>

          <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "10px", marginBottom: "32px" }}>
            {tabs.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{
                padding: "8px 20px",
                borderRadius: "999px",
                border: "1.5px solid",
                borderColor: activeTab === tab ? "var(--primary-blue)" : "var(--border)",
                background: activeTab === tab ? "var(--primary-blue)" : "var(--card-bg)",

              <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
                {[
                  { icon: "fa-landmark", title: "Rich Heritage", desc: "Home to UNESCO World Heritage Sites like Ajanta and Ellora Caves, and the mighty forts of the Maratha Empire." },
                  { icon: "fa-gem", title: "Underrated Hidden Gems", desc: "From the misty valleys of Amboli to the meteor crater of Lonar Lake — Maharashtra's hidden beauties are unmatched." },
                  { icon: "fa-wine-glass", title: "Unique Experiences", desc: "Sip wine at Sula Vineyards, witness turtle festivals at Velas Beach, or trek through the Valley of Shadows at Sandhan." },
                  { icon: "fa-om", title: "Spiritual Depth", desc: "Five of the twelve sacred Jyotirlingas are in Maharashtra, making it a premier destination for spiritual seekers." },
                  { icon: "fa-water", title: "Coastal Wonders", desc: "The Konkan coastline stretches over 720 km with pristine beaches, sea forts, and fresh Malvani seafood." },
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
                    <div style={{ width: 36, height: 36, borderRadius: "50%", background: "rgba(249,178,51,0.15)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <i className={`fa ${item.icon}`} style={{ color: "#f9b233", fontSize: "0.95rem" }} />
                    </div>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: "0.95rem", color: "#f9b233", marginBottom: 4 }}>{item.title}</div>
                      <div style={{ color: "rgba(255,255,255,0.72)", fontSize: "0.88rem", lineHeight: 1.7 }}>{item.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div>
              <p style={{ color: "#01696f", fontWeight: 700, fontSize: "0.82rem", letterSpacing: "3px", textTransform: "uppercase", marginBottom: 14 }}>TRAVEL BUDGET GUIDE</p>
              <h2 style={{ fontSize: "2rem", fontWeight: 900, color: "#0f1e32", margin: "0 0 16px", lineHeight: 1.3 }}>Average Hotel &amp; Food Prices</h2>
              <div style={{ width: "50px", height: "3px", background: "#f9b233", borderRadius: "2px", marginBottom: "28px" }} />
              <p style={{ color: "#64748b", fontSize: "0.92rem", lineHeight: 1.8, marginBottom: 28 }}>
                Plan your budget smartly. Below are average per-night hotel costs and per-meal food expenses across major Maharashtra destinations.
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {cityPrices.map((c, i) => (
                  <div key={i} style={{ background: "#fff", borderRadius: 14, padding: "18px 22px", boxShadow: "0 2px 12px rgba(15,23,42,0.07)", border: "1px solid #e2e8f0", display: "flex", alignItems: "center", gap: 18 }}>
                    <div style={{ width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg, #01696f, #0f1e32)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <i className={`fa ${c.icon}`} style={{ color: "#fff", fontSize: "1.1rem" }} />

                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 800, fontSize: "1rem", color: "#0f1e32", marginBottom: 6 }}>{c.city}</div>

                          <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>Hotel / Night</div>

                        <div>
                          <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.5px" }}>Food / Meal</div>
                          <div style={{ fontWeight: 700, color: "#f9b233", fontSize: "0.92rem", marginTop: 2 }}>{c.food}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              <p style={{ marginTop: 18, fontSize: "0.78rem", color: "#94a3b8", fontStyle: "italic" }}>* Prices are approximate and may vary by season and category.</p>

          </div>
        </section>

    }


    function App() {
      const [placesData, setPlacesData] = useState([]);
      const [jsonData, setJsonData] = useState(null);
      const [results, setResults] = useState(null);
      const [page, setPage] = useState("home");
      const [selectedCity, setSelectedCity] = useState(null);
      const [selectedPlace, setSelectedPlace] = useState(null);
      const [fromPage, setFromPage] = useState("home");
      const [darkMode, setDarkMode] = useState(false);
      const [trolleyItems, settrolleyItems] = useState([]);
      const plannerRef = useRef(null);
      const recRef = useRef(null);

      const addToTrolley = place => {
        settrolleyItems(prev =>
          prev.some(c => c.name === place.name && c.city === place.city) ? prev : [...prev, place]
        );
      };
      const removeFromTrolley = place =>
        settrolleyItems(prev => prev.filter(c => !(c.name === place.name && c.city === place.city)));
      const clearTrolley = () => settrolleyItems([]);

      useEffect(() => {
        document.documentElement.setAttribute(
          "data-theme", darkMode ? "dark" : "light"
        );
      }, [darkMode]);

      useEffect(() => {
        window.__testData = placesData;
        console.log("Updated placesData:", placesData);
      }, [placesData]);

      useEffect(() => {
        fetch('./maharashtraData.json')
          .then(res => res.json())
          .then(data => {
            setJsonData(data);
            const cityPlaces = (data.cities || []).flatMap(city => {
              const categories = city.places || {};
              return Object.entries(categories).flatMap(([type, places]) =>
                (places || []).map(p => ({
                  city: city.name,
                  name: p.name,
                  category: p.tags || [type],
                  icon: p.icon || "📍",
                  description: p.short_description || "",
                  short_description: p.short_description || "",
                  long_description: p.long_description || "",
                  famous_for: p.famous_for || [],
                  location: p.location || city.name + ", Maharashtra",
                  cost: 0
                }))
              );
            });
            if (cityPlaces.length > 0) {
              setPlacesData(cityPlaces);
            } else {
              console.warn("JSON empty, using default data");
              setPlacesData(defaultPlacesData);
            }
          })
          .catch(err => { console.error("Error loading JSON:", err); setPlacesData(defaultPlacesData); });
      }, []);

      const scrollToPlanner = () => plannerRef.current?.scrollIntoView({ behavior: "smooth" });
      const handleResults = data => {
        setResults(data);
        setTimeout(() => recRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      };

      const navbarProps = {
        onPlan: () => { setPage("home"); setTimeout(scrollToPlanner, 100); },
        placesData,
        onPlaceClick: place => { setSelectedPlace(place); window.scrollTo({ top: 0, behavior: "smooth" }); },
        onCityClick: city => { setSelectedCity(city); setPage("details"); },
        darkMode,
        toggleDark: () => setDarkMode(d => !d),
        trolleyCount: trolleyItems.length,
        onTrolleyClick: () => { setSelectedPlace(null); setPage("trolley"); window.scrollTo({ top: 0 }); }
      };

      if (selectedPlace) return (
        <>
          <Navbar {...navbarProps} onPlan={scrollToPlanner} />
          <PlaceDetailPage place={selectedPlace} onBack={() => { setSelectedPlace(null); window.scrollTo({ top: 0 }); }} />
          <Footer />
        </>
      );

      if (page === "trolley") return (
        <>
          <Navbar {...navbarProps} />
          <TrolleyPage trolleyItems={trolleyItems} onRemove={removeFromTrolley} onBack={() => setPage("home")} onClearTrolley={clearTrolley} />
          <Footer />
        </>
      );

      if (page === "cities") return (
        <>
          <Navbar {...navbarProps} />
          <CitySelectionPage onSelect={city => { setSelectedCity(city); setPage("details"); }} onBack={() => setPage("home")} />
          <Footer />
        </>
      );

      if (page === "details") return (
        <>
          <Navbar {...navbarProps} />
          <CityDetailsPage city={selectedCity} onBack={() => setPage("cities")} placesData={placesData} onPlaceClick={setSelectedPlace} onAddToTrolley={addToTrolley} trolleyItems={trolleyItems} />
          <Footer />
        </>
      );

      return (
        <>
          <Navbar {...navbarProps} onPlan={scrollToPlanner} />
          <Carousel onExplore={() => setPage("cities")} />
          <main>
            <SiteBranding />
            <Intro />
            <HomeHighlights data={jsonData} onPlaceClick={setSelectedPlace} />
            <TripPlanner plannerRef={plannerRef} onResults={handleResults} placesData={placesData} />
            <Recommendations results={results} recRef={recRef} onPlaceClick={setSelectedPlace} onAddToTrolley={addToTrolley} trolleyItems={trolleyItems} />
            <Gallery />
            <WhyUs />
            <OurTeam />
            <FAQ />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
